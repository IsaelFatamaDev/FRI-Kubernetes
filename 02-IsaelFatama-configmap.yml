# CONFIGMAP
# almacena configuraciones no sensibles en pares clave-valor, solo que a diferencia de un secret este esta en texto plano
# se usa en variables de entorno, command line, etc

apiVersion: v1
kind: ConfigMap
metadata:
  name: isaelfatama-config
  namespace: isaelfatama
  labels:
    app: isaelfatama-nginx
data:
  APP_ENV: "produccion"
  APP_PORT: "80"
  APP_VERSION: "1.0.0"
